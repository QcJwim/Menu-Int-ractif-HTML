<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy Café Torréfacteur</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #3e2723 0%, #1a100c 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: #f5e6d3;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .coffee-beans {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bean {
            position: absolute;
            width: 25px;
            height: 35px;
            background: #5d4037;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.12;
            animation: beanFloat 20s ease-in-out infinite, beanRotate 15s linear infinite;
        }

        .bean:nth-child(odd) {
            animation-duration: 25s, 18s;
        }

        .bean:nth-child(even) {
            animation-duration: 22s, 20s;
            animation-direction: reverse;
        }

        @keyframes beanFloat {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(15px); }
            50% { transform: translateY(-15px) translateX(-10px); }
            75% { transform: translateY(-40px) translateX(5px); }
        }

        @keyframes beanRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .bean::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(10deg);
            width: 2px;
            height: 70%;
            background: #3e2723;
            border-radius: 2px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 450px;
            height: auto;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
            animation: slideUp 0.8s ease-out, pulse 4s ease-in-out infinite;
        }

        .menu {
            background: linear-gradient(145deg, rgba(62, 39, 35, 0.9), rgba(26, 16, 12, 0.95));
            border-radius: 20px;
            border: 1px solid #5d4037;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr 120px 120px;
            gap: 10px;
            padding: 15px 20px;
            background: linear-gradient(145deg, #5d4037, #4e342e);
            border-radius: 15px 15px 0 0;
            font-weight: 700;
            color: #ffcc80;
            font-size: 0.9rem;
            text-align: center;
        }

        .menu {
            background: linear-gradient(145deg, rgba(62, 39, 35, 0.9), rgba(26, 16, 12, 0.95));
            border-radius: 20px;
            border: 1px solid #5d4037;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .menu-item {
            display: grid;
            grid-template-columns: 1fr 120px 120px;
            gap: 10px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.4);
            transition: background 0.3s;
            align-items: center;
            animation: slideUp 0.5s ease-out both;
        }

        .menu-item:nth-child(1) { animation-delay: 0.1s; }
        .menu-item:nth-child(2) { animation-delay: 0.15s; }
        .menu-item:nth-child(3) { animation-delay: 0.2s; }
        .menu-item:nth-child(4) { animation-delay: 0.25s; }
        .menu-item:nth-child(5) { animation-delay: 0.3s; }
        .menu-item:nth-child(6) { animation-delay: 0.35s; }
        .menu-item:nth-child(7) { animation-delay: 0.4s; }
        .menu-item:nth-child(8) { animation-delay: 0.45s; }
        .menu-item:nth-child(9) { animation-delay: 0.5s; }
        .menu-item:nth-child(10) { animation-delay: 0.55s; }
        .menu-item:nth-child(11) { animation-delay: 0.6s; }
        .menu-item:nth-child(12) { animation-delay: 0.65s; }
        .menu-item:nth-child(13) { animation-delay: 0.7s; }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: rgba(141, 110, 99, 0.2);
        }

        .menu-item.disabled {
            opacity: 0.4;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 700;
            color: #f5e6d3;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-images {
            display: flex;
            gap: 5px;
            width: 120px;
            flex-shrink: 0;
            justify-content: center;
        }

        .item-name span {
            white-space: nowrap;
        }

        .product-icon {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 8px;
            flex-shrink: 0;
        }
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }

        .item-name.disabled {
            text-decoration: line-through;
        }

        .price {
            position: relative;
            cursor: pointer;
            padding: 8px 12px;
            background: linear-gradient(145deg, #5d4037, #4e342e);
            border-radius: 20px;
            font-weight: 700;
            color: #ffcc80;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
        }

        .price:hover {
            border-color: #ffcc80;
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 204, 128, 0.3);
        }

        .price:active {
            transform: scale(0.95);
        }

        .price .hot, .price .cold {
            display: none;
            position: absolute;
            bottom: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            background: #fff;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 1000;
        }

        .price:hover .hot,
        .price:hover .cold {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .price:hover .hot::after,
        .price:hover .cold::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #fff transparent transparent;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .hot-img, .cold-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .no-price {
            color: #5d4037;
            font-style: italic;
            opacity: 0.5;
            cursor: default;
        }

        .extras {
            background: linear-gradient(145deg, rgba(62, 39, 35, 0.9), rgba(26, 16, 12, 0.95));
            border-radius: 15px;
            border: 1px solid #5d4037;
            padding: 20px;
            margin-top: 20px;
            animation: slideUp 0.8s ease-out 0.8s both;
        }

        .extras-title {
            font-weight: 700;
            color: #ffcc80;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .extras-content {
            color: #d7ccc8;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .extras-content p {
            margin-bottom: 8px;
        }

        .extra-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #d7ccc8;
        }

        .extra-title {
            font-weight: 700;
            color: #ffcc80;
            margin-top: 12px;
            margin-bottom: 8px;
        }

        .extra-price {
            font-weight: 700;
            color: #ffcc80;
        }

        .extra-separator {
            color: #8d6e63;
        }

        .extra-items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }

        .extra-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #d7ccc8;
        }

        .extra-item img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .extra-price-inline {
            font-weight: 700;
            color: #ffcc80;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(93, 64, 55, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            opacity: 0.4;
            transition: all 0.3s;
            z-index: 100;
            animation: slideUp 1s ease-out 1s both;
        }

        .admin-link:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        .juice-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .juice-overlay.show {
            display: flex;
        }

        .juice-modal {
            background: linear-gradient(145deg, #3e2723, #1a100c);
            border: 2px solid #5d4037;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .juice-modal h2 {
            color: #ffcc80;
            font-size: 1.6rem;
            margin-bottom: 25px;
        }

        .juice-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .juice-item {
            background: #5d4037;
            padding: 12px;
            border-radius: 10px;
            color: #f5e6d3;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .juice-hint {
            color: #8d6e63;
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .juice-item {
            background: #5d4037;
            padding: 12px;
            border-radius: 10px;
            color: #f5e6d3;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .juice-item img {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="juice-overlay" id="juiceOverlay">
        <div class="juice-modal">
            <h2>🧃 Jus Sans Sucre</h2>
            <div class="juice-list">
                <div class="juice-item"><img src="images/melondeau.png" alt=""> Melon d'eau</div>
                <div class="juice-item"><img src="images/Bleuet.png" alt=""> Bleuet</div>
                <div class="juice-item"><img src="images/Canneberge.png" alt=""> Canneberge</div>
                <div class="juice-item"><img src="images/Fruitdudragon.png" alt=""> Fruit du dragon</div>
                <div class="juice-item"><img src="images/Framboise Bleue.png" alt=""> Framboise bleue</div>
                <div class="juice-item"><img src="images/Fraise.png" alt=""> Fraise</div>
                <div class="juice-item"><img src="images/mangue.png" alt=""> Mangue</div>
                <div class="juice-item"><img src="images/Fruitdelapassion.png" alt=""> Fruit de la passion</div>
            </div>
        </div>
    </div>

    <div class="coffee-beans" id="beans"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <a href="admin.html">
                    <img src="https://cdn.discordapp.com/attachments/1491147932911800532/1494091883901620324/logo_andy.png?ex=69e15900&is=69e00780&hm=9b37a7579c652a79c8f5fa37567f88b5d1d465a8b26c9e0f205a5f0b14fd5d70&" alt="Andy Café">
                </a>
            </div>
        </header>

        <div class="menu">
            <div class="header-row">
                <span></span>
                <span>🔥 CHAUD</span>
                <span>❄️ GLACÉ</span>
            </div>

            <div id="menu-list"></div>
</div>

        <div class="extras">
            <div class="extras-title">⚡ EXTRAS & INFOS</div>
            <div class="extras-content" id="extras-content">
            </div>
        </div>

    </div>

    <script>
        const defaultProducts = [
            { id: 1, name: "Latte", hot: "4,75 / 5,50", cold: "5", imageHot: "images/Latte.png", imageCold: "images/LatteGlace.png", active: true },
            { id: 2, name: "Cappuccino", hot: "4,75 / 5,50", cold: "", imageHot: "images/Cappuccino.png", imageCold: "", active: true },
            { id: 14, name: "Flat White", hot: "4,75 / 5,50", cold: "", imageHot: "images/FlatWhite.png", imageCold: "", active: true },
            { id: 3, name: "Americano / Long Black", hot: "4,50", cold: "4,50", imageHot: "images/Americano.png", imageCold: "images/AmericanoGlace.png", active: true },
            { id: 4, name: "Espresso (S/D, Ristretto, Lungo)", hot: "4", cold: "", imageHot: "images/Espresso.png", imageCold: "", active: true },
            { id: 5, name: "Cortado", hot: "4,50", cold: "", imageHot: "images/Cortado.png", imageCold: "", active: true },
            { id: 6, name: "Chai Latte (+1$ Dirty ☕)", hot: "4,50 / 5,50", cold: "5", imageHot: "images/Chailatte.png", imageCold: "images/ChaiLatteGlace.png", active: true },
            { id: 7, name: "Matcha Latte", hot: "4,75 / 5,50", cold: "5,25", imageHot: "images/MatchaLatte.png", imageCold: "images/MatchaLatteGlace.png", active: true },
            { id: 8, name: "Mocha", hot: "5,50 / 6,50", cold: "6", imageHot: "images/Mocha.png", imageCold: "images/MochaGlace.png", active: true },
            { id: 9, name: "Nuages (Matcha, Chai, Latte)", hot: "", cold: "7,50", imageHot: "", imageCold: "images/Nuages.png", active: true },
            { id: 10, name: "Chocolat chaud", hot: "3,50", cold: "", imageHot: "images/ChocolatChaud.png", imageCold: "", active: true },
            { id: 11, name: "Limonade sans sucre", hot: "", cold: "3", imageHot: "", imageCold: "images/Limonade.png", active: true },
            { id: 12, name: "Jus sans sucre", hot: "", cold: "3", imageHot: "", imageCold: "images/Jussanssucre.png", active: true }
        ];

        const defaultExtras = {
            extras: [
                { name: "Shot Espresso", price: "+2,00" },
                { name: "Mousse froide", price: "+1,00" }
            ],
            syrups: [
                { name: "Vanille" },
                { name: "Noisette" },
                { name: "Caramel" },
                { name: "Fraise" },
                { name: "Bleuet" }
            ],
            milks: [
                { name: "Vache" },
                { name: "Avoine" },
                { name: "Sans lactose" }
            ]
        };

        function loadMenu() {
            const saved = localStorage.getItem('menuProducts');
            let extras;
            
            products = JSON.parse(JSON.stringify(defaultProducts));
            
            if (saved) {
                const data = JSON.parse(saved);
                extras = data.extras || defaultExtras;
                
                if (data.products) {
                    data.products.forEach(savedProduct => {
                        const product = products.find(p => p.id === savedProduct.id);
                        if (product) {
                            product.active = savedProduct.active;
                            product.hot = savedProduct.hot;
                            product.cold = savedProduct.cold;
                        }
                    });
                }
            } else {
                extras = defaultExtras;
                localStorage.setItem('menuProducts', JSON.stringify({
                    products: products,
                    extras: extras
                }));
            }

            const list = document.getElementById('menu-list');
            list.innerHTML = products.map(p => {
                const hotDiv = p.hot ? `
                    <div class="price">
                        ${p.hot}
                        ${p.imageHot ? `<div class="hot"><img src="${p.imageHot}" class="hot-img" alt="${p.name}"></div>` : ''}
                    </div>
                ` : '<div class="price no-price">—</div>';

                const coldDiv = p.cold ? `
                    <div class="price">
                        ${p.cold}
                        ${p.imageCold ? `<div class="cold"><img src="${p.imageCold}" class="cold-img" alt="${p.name}"></div>` : ''}
                    </div>
                ` : '<div class="price no-price">—</div>';

                const productImages = [];
                if (p.imageHot) productImages.push(`<img src="${p.imageHot}" class="product-icon" alt="${p.name} chaud">`);
                if (p.imageCold) productImages.push(`<img src="${p.imageCold}" class="product-icon" alt="${p.name} glacé">`);
                const productImageHtml = `<div class="item-images">${productImages.join('')}</div>`;

                return `
                    <div class="menu-item ${p.active ? '' : 'disabled'}">
                        <span class="item-name ${p.active ? '' : 'disabled'}">${productImageHtml}<span>${p.name}</span></span>
                        ${hotDiv}
                        ${coldDiv}
                    </div>
                `;
            }).join('');

            const extrasContent = document.getElementById('extras-content');
            let extrasHtml = '<div class="extra-items">';
            
            (extras.extras || defaultExtras.extras).forEach(e => {
                extrasHtml += `<div class="extra-item"><img src="images/Espresso.png" alt="${e.name}"><span class="extra-price">${e.name} (${e.price})</span></div>`;
            });
            extrasHtml += '</div>';
            
            extrasHtml += '<div class="extra-row"><span class="extra-title">Sirop :</span><span class="extra-price-inline">(+0,50)</span></div>';
            extrasHtml += '<div class="extra-items">';
            (extras.syrups || defaultExtras.syrups).forEach(s => {
                extrasHtml += `<div class="extra-item"><img src="images/${s.name}.png" alt="${s.name}"> ${s.name}</div>`;
            });
            extrasHtml += '</div>';
            
            extrasHtml += '<div class="extra-row extra-title">Choix de lait :</div>';
            extrasHtml += '<div class="extra-items">';
            (extras.milks || defaultExtras.milks).forEach(m => {
                const imgName = m.name.replace(/\s/g, '').replace('Sanslactose', 'SansLactose');
                extrasHtml += `<div class="extra-item"><img src="images/${imgName}.png" alt="${m.name}"> ${m.name}</div>`;
            });
            extrasHtml += '</div>';
            
            extrasContent.innerHTML = extrasHtml;
        }

        function createCoffeeBeans() {
            const container = document.getElementById('beans');
            for (let i = 0; i < 40; i++) {
                const bean = document.createElement('div');
                bean.className = 'bean';
                bean.style.left = Math.random() * 100 + '%';
                bean.style.top = Math.random() * 100 + '%';
                bean.style.width = (15 + Math.random() * 20) + 'px';
                bean.style.height = (20 + Math.random() * 25) + 'px';
                bean.style.opacity = 0.05 + Math.random() * 0.12;
                bean.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(bean);
            }
        }

        loadMenu();
        createCoffeeBeans();

        const juiceOverlay = document.getElementById('juiceOverlay');

        document.addEventListener('keydown', (e) => {
            if (e.key === '1' && !e.repeat) {
                juiceOverlay.classList.add('show');
            }
        });

        document.addEventListener('keyup', () => {
            juiceOverlay.classList.remove('show');
        });

        juiceOverlay.addEventListener('click', () => {
            juiceOverlay.classList.remove('show');
        });
    </script>
</body>
</html>
